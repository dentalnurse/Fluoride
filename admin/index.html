<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - DNT Fluoride Varnish Certificate</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <!-- Admin login screen (shown before auth) -->
  <div id="adminLogin" class="auth-wrap">
    <div class="auth-card" style="max-width:400px">
      <div class="auth-logo">
        <img src="https://dentalnurse.training/wp-content/uploads/2023/05/WEBLOGO.png"
             alt="DNT" style="height:56px;margin:0 auto 1rem" onerror="this.style.display='none'"/>
        <h2>Admin Access</h2>
        <p style="font-size:0.85rem;color:var(--ink-light);margin-top:0.25rem">Fluoride Varnish Certificate Platform</p>
      </div>
      <div class="form-group">
        <label>Admin email</label>
        <input type="email" id="adminEmail" value="emily@dentalnurse.training"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="adminPass" placeholder="••••••••"/>
      </div>
      <div id="adminLoginErr" class="form-error" style="display:none"></div>
      <button class="btn btn-primary form-submit" onclick="adminLogin()">Log in to admin</button>
    </div>
  </div>

  <!-- Admin panel (shown after auth) -->
  <div id="adminPanel" style="display:none">
    <div class="admin-header">
      <div>
        <h1>DNT - Admin Dashboard</h1>
        <span style="font-size:0.8rem;opacity:0.6">Fluoride Varnish Application Certificate</span>
      </div>
      <div style="display:flex;align-items:center;gap:1rem">
        <span style="font-size:0.85rem;color:rgba(255,255,255,0.6)">emily@dentalnurse.training</span>
        <button class="btn btn-outline btn-sm" style="border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.8)" onclick="adminLogout()">Log out</button>
      </div>
    </div>

    <div class="admin-panel">
      <!-- Stats row -->
      <div class="admin-stat-row" id="statsRow">
        <div class="admin-stat"><div class="as-n" id="statTotal">-</div><div class="as-lbl">Total learners</div></div>
        <div class="admin-stat"><div class="as-n" id="statPending">-</div><div class="as-lbl">Awaiting approval</div></div>
        <div class="admin-stat"><div class="as-n" id="statActive">-</div><div class="as-lbl">Active learners</div></div>
        <div class="admin-stat"><div class="as-n" id="statSubmissions">-</div><div class="as-lbl">New submissions</div></div>
      </div>

      <!-- Tabs -->
      <div class="admin-tabs">
        <div class="admin-tab active" onclick="switchAdminTab('pending')">⏳ Awaiting Approval</div>
        <div class="admin-tab" onclick="switchAdminTab('all')">👥 All Learners</div>
        <div class="admin-tab" onclick="switchAdminTab('submissions')">📬 Submissions</div>
      </div>

      <!-- Tab content -->
      <div id="tabContent">
        <div style="text-align:center;padding:3rem;color:var(--ink-light)">Loading learners…</div>
      </div>
    </div>
  </div>

  <!-- Learner detail modal -->
  <div class="modal-overlay hidden" id="learnerModal">
    <div class="modal" id="learnerModalContent"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, serverTimestamp }
                                from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app  = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    let learners   = [];
    let currentTab = 'pending';

    // ── Auth ───────────────────────────────────────────────────────────────
    onAuthStateChanged(auth, (user) => {
      if (user && user.email === ADMIN_EMAIL) {
        document.getElementById('adminLogin').style.display  = 'none';
        document.getElementById('adminPanel').style.display  = '';
        loadLearners();
      }
    });

    window.adminLogin = async () => {
      const email = document.getElementById('adminEmail').value.trim();
      const pass  = document.getElementById('adminPass').value;
      const err   = document.getElementById('adminLoginErr');
      if (email !== ADMIN_EMAIL) {
        err.textContent = 'Invalid admin credentials.'; err.style.display = 'block'; return;
      }
      try {
        await signInWithEmailAndPassword(auth, email, pass);
      } catch(e) {
        err.textContent = 'Login failed. Please check your password.'; err.style.display = 'block';
      }
    };

    window.adminLogout = async () => {
      await signOut(auth);
      document.getElementById('adminLogin').style.display  = '';
      document.getElementById('adminPanel').style.display  = 'none';
    };

    // ── Load learners ──────────────────────────────────────────────────────
    async function loadLearners() {
      const snap = await getDocs(collection(db, 'learners'));
      learners = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderTab(currentTab);
    }

    function updateStats() {
      const pending     = learners.filter(l => !l.unlocked).length;
      const active      = learners.filter(l => l.unlocked).length;
      const submissions = learners.filter(l =>
        l.writtenSubmitted || l.practicalSubmitted || l.reflectionSubmitted
      ).length;
      document.getElementById('statTotal').textContent       = learners.length;
      document.getElementById('statPending').textContent     = pending;
      document.getElementById('statActive').textContent      = active;
      document.getElementById('statSubmissions').textContent = submissions;
    }

    // ── Tabs ──────────────────────────────────────────────────────────────
    window.switchAdminTab = (tab) => {
      currentTab = tab;
      document.querySelectorAll('.admin-tab').forEach((t, i) => {
        t.classList.toggle('active', ['pending','all','submissions'][i] === tab);
      });
      renderTab(tab);
    };

    function renderTab(tab) {
      const el = document.getElementById('tabContent');
      if (tab === 'pending')     { renderPendingTab(el); return; }
      if (tab === 'all')         { renderAllTab(el); return; }
      if (tab === 'submissions') { renderSubmissionsTab(el); return; }
    }

    // ── Pending tab ────────────────────────────────────────────────────────
    function renderPendingTab(el) {
      const pending = learners.filter(l => !l.unlocked);
      if (!pending.length) {
        el.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--ink-light)">✅ No accounts awaiting approval</div>';
        return;
      }
      el.innerHTML = `
        <p style="margin-bottom:1rem;color:var(--ink-light);font-size:0.9rem">${pending.length} account${pending.length>1?'s':''} awaiting approval. Once you have confirmed payment, click Approve to unlock access.</p>
        <table class="admin-table">
          <thead><tr>
            <th>Name</th><th>Email / GDC</th><th>Registered</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${pending.map(l => `<tr>
              <td><div class="td-name">${l.name}</div></td>
              <td><div>${l.email}</div><div class="td-email">GDC: ${l.gdc}</div></td>
              <td style="font-size:0.82rem;color:var(--ink-light)">${l.enrolledAt?.toDate ? l.enrolledAt.toDate().toLocaleDateString('en-GB') : '-'}</td>
              <td>
                <div class="admin-actions">
                  <button class="btn btn-success btn-sm" onclick="approveLearner('${l.id}','${l.name}')">✓ Approve</button>
                  <button class="btn btn-outline btn-sm" onclick="openLearnerModal('${l.id}')">View</button>
                </div>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    // ── All learners tab ──────────────────────────────────────────────────
    function renderAllTab(el) {
      if (!learners.length) {
        el.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--ink-light)">No learners yet.</div>';
        return;
      }
      el.innerHTML = `
        <div style="margin-bottom:1rem">
          <input type="text" id="learnerSearch" placeholder="Search by name or email..." style="padding:0.6rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:0.9rem;width:280px;outline:none" oninput="filterLearners(this.value)"/>
        </div>
        <table class="admin-table" id="allLearnersTable">
          <thead><tr>
            <th>Name</th><th>Email / GDC</th><th>Status</th><th>Theory</th><th>Written</th><th>Practical</th><th>Reflection</th><th>Actions</th>
          </tr></thead>
          <tbody id="allLearnersBody">
            ${renderAllRows(learners)}
          </tbody>
        </table>`;
    }

    function renderAllRows(list) {
      return list.map(l => {
        const mp = l.moduleProgress || {};
        const passed = [1,2,3,4,5].filter(i => mp[i]===2).length;
        return `<tr>
          <td><div class="td-name">${l.name}</div></td>
          <td><div style="font-size:0.82rem">${l.email}</div><div class="td-email">GDC: ${l.gdc}</div></td>
          <td>${l.unlocked ? '<span class="pill pill-green">Active</span>' : '<span class="pill pill-orange">Pending</span>'}</td>
          <td><span class="pill ${passed===5?'pill-green':passed>0?'pill-teal':'pill-grey'}">${passed}/5</span></td>
          <td>${l.writtenSubmitted    ? '<span class="pill pill-green">✓</span>' : '<span class="pill pill-grey">-</span>'}</td>
          <td>${l.practicalSubmitted  ? '<span class="pill pill-green">✓</span>' : '<span class="pill pill-grey">-</span>'}</td>
          <td>${l.reflectionSubmitted ? '<span class="pill pill-green">✓</span>' : '<span class="pill pill-grey">-</span>'}</td>
          <td>
            <div class="admin-actions">
              <button class="btn btn-outline btn-sm" onclick="openLearnerModal('${l.id}')">Manage</button>
              ${!l.unlocked ? `<button class="btn btn-success btn-sm" onclick="approveLearner('${l.id}','${l.name}')">Approve</button>` : ''}
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    window.filterLearners = (q) => {
      const filtered = learners.filter(l =>
        l.name?.toLowerCase().includes(q.toLowerCase()) ||
        l.email?.toLowerCase().includes(q.toLowerCase())
      );
      const body = document.getElementById('allLearnersBody');
      if (body) body.innerHTML = renderAllRows(filtered);
    };

    // ── Submissions tab ──────────────────────────────────────────────────
    function renderSubmissionsTab(el) {
      const withSubs = learners.filter(l => l.writtenSubmitted || l.practicalSubmitted || l.reflectionSubmitted);
      if (!withSubs.length) {
        el.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--ink-light)">No submissions yet.</div>';
        return;
      }
      el.innerHTML = `
        <table class="admin-table">
          <thead><tr>
            <th>Learner</th><th>Submission</th><th>Submitted</th><th>File</th><th>Feedback</th><th>Actions</th>
          </tr></thead>
          <tbody>
            ${withSubs.flatMap(l => {
              const rows = [];
              if (l.writtenSubmitted)    rows.push({ l, type:'written',    label:'Written Tasks',      url:l.writtenFileUrl,    feedback:l.writtenFeedback,    at:l.writtenSubmittedAt });
              if (l.practicalSubmitted)  rows.push({ l, type:'practical',  label:'Practical Portfolio', url:l.practicalFileUrl,  feedback:l.practicalFeedback,  at:l.practicalSubmittedAt });
              if (l.reflectionSubmitted) rows.push({ l, type:'reflection', label:'Final Reflection',    url:l.reflectionFileUrl, feedback:l.reflectionFeedback, at:l.reflectionSubmittedAt });
              return rows;
            }).map(({ l, type, label, url, feedback, at }) => `<tr>
              <td><div class="td-name">${l.name}</div><div class="td-email">${l.email}</div></td>
              <td><span class="pill pill-teal">${label}</span></td>
              <td style="font-size:0.82rem;color:var(--ink-light)">${at?.toDate ? at.toDate().toLocaleDateString('en-GB') : '-'}</td>
              <td>${url ? `<a href="${url}" target="_blank" class="submission-link">📥 Download</a>` : '<span style="color:var(--ink-light);font-size:0.82rem">Text only</span>'}</td>
              <td style="font-size:0.82rem">${feedback ? `<span style="color:var(--success)">✓ Given</span>` : '<span style="color:var(--ink-light)">Pending</span>'}</td>
              <td>
                <button class="btn btn-primary btn-sm" onclick="openFeedbackModal('${l.id}','${type}','${l.name}')">${feedback ? 'Edit feedback' : 'Add feedback'}</button>
<button class="btn btn-success btn-sm" onclick="markPassed('${l.id}','${type}','${l.name}')">✓ Mark passed</button>
              </td>
            </tr>`).join('')}
          </tbody>
        </table>`;
    }

    // ── Approve learner ──────────────────────────────────────────────────
      window.approveLearner = async (id, name) => {
      if (!confirm('Approve ' + name + ' and send them a welcome email?')) return;
      await updateDoc(doc(db, 'learners', id), { unlocked: true, approvedAt: serverTimestamp() });
      const l = learners.find(x => x.id === id);
      if (l) l.unlocked = true;
      try {
        if (typeof emailjs !== 'undefined' && l) {
          await emailjs.send(EMAILJS_CONFIG.serviceId, EMAILJS_CONFIG.templateId, {
            to_email: l.email, to_name: l.name, learner_name: l.name,
            learner_email: l.email, learner_gdc: l.gdc,
            submission_type: 'Welcome', file_url: 'N/A',
            submitted_at: new Date().toLocaleString('en-GB'),
            message: 'Congratulations ' + l.name + '! Your DNT Fluoride Varnish Certificate course is now active. Log in at: https://dentalnurse.github.io/Fluoride/login.html using your email address and the password sent separately. Work through the 5 modules in order, pass each MCQ, then complete your written tasks, logbook and case studies. Duration: 3-6 months. Questions? Contact emily@dentalnurse.training. Good luck! DNT Dental Nurse Training'
          }, EMAILJS_CONFIG.publicKey);
          showToast(name + ' approved and welcome email sent!', 'success');
        } else {
          showToast(name + ' approved!', 'success');
        }
      } catch(e) {
        console.error(e);
        showToast(name + ' approved! Welcome email failed - send manually.', 'success');
      }
      updateStats();
      renderTab(currentTab);
    };


    // ── Learner detail modal ──────────────────────────────────────────────
    window.openLearnerModal = (id) => {
      const l  = learners.find(x => x.id === id);
      if (!l) return;
      const mp = l.moduleProgress || {};
      document.getElementById('learnerModalContent').innerHTML = `
        <div class="modal-header">
          <h3>${l.name}</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <table style="width:100%;font-size:0.9rem;border-collapse:collapse">
          ${[['Email', l.email],['GDC', l.gdc],['Status', l.unlocked?'Active':'Pending approval'],
             ['Enrolled', l.enrolledAt?.toDate ? l.enrolledAt.toDate().toLocaleDateString('en-GB') : '-'],
             ['Module 1', mp[1]===2?'✅ Passed':mp[1]===1?'In progress':'Not started'],
             ['Module 2', mp[2]===2?'✅ Passed':mp[2]===1?'In progress':'Not started'],
             ['Module 3', mp[3]===2?'✅ Passed':mp[3]===1?'In progress':'Not started'],
             ['Module 4', mp[4]===2?'✅ Passed':mp[4]===1?'In progress':'Not started'],
             ['Module 5', mp[5]===2?'✅ Passed':mp[5]===1?'In progress':'Not started'],
             ['Written',    l.writtenSubmitted?'✅ Submitted':'Not submitted'],
             ['Practical',  l.practicalSubmitted?'✅ Submitted':'Not submitted'],
             ['Reflection', l.reflectionSubmitted?'✅ Submitted':'Not submitted'],
           ].map(([k,v]) => `<tr style="border-bottom:1px solid var(--border)">
            <td style="padding:0.55rem 0.75rem;color:var(--ink-light);font-weight:600;width:140px">${k}</td>
            <td style="padding:0.55rem 0.75rem">${v}</td>
           </tr>`).join('')}
        </table>
        <div class="form-group" style="margin-top:1.25rem">
          <label>Internal notes (not visible to learner)</label>
          <textarea id="adminNotes" style="min-height:80px">${l.notes||''}</textarea>
        </div>
        <div class="modal-footer">
          ${!l.unlocked ? `<button class="btn btn-success" onclick="approveLearner('${l.id}','${l.name}');closeModal()">✓ Approve learner</button>` : ''}
          <button class="btn btn-outline" onclick="saveNotes('${l.id}')">Save notes</button>
          <button class="btn btn-primary" onclick="closeModal()">Close</button>
        </div>`;
      document.getElementById('learnerModal').classList.remove('hidden');
    };

    window.closeModal = () => document.getElementById('learnerModal').classList.add('hidden');

    window.saveNotes = async (id) => {
      const notes = document.getElementById('adminNotes').value;
      await updateDoc(doc(db, 'learners', id), { notes });
      const l = learners.find(x => x.id === id);
      if (l) l.notes = notes;
      showToast('Notes saved ✓');
    };

    // ── Feedback modal ────────────────────────────────────────────────────
    window.openFeedbackModal = (id, type, name) => {
      const l = learners.find(x => x.id === id);
      const existing = l?.[`${type}Feedback`] || '';
      document.getElementById('learnerModalContent').innerHTML = `
        <div class="modal-header">
          <h3>Feedback - ${name}</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <p style="font-size:0.9rem;color:var(--ink-light);margin-bottom:1rem">This feedback will be visible to the learner in their dashboard.</p>
        <div class="form-group">
          <label>Your feedback</label>
          <textarea id="feedbackText" style="min-height:160px">${existing}</textarea>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveFeedback('${id}','${type}')">Save feedback</button>
        </div>`;
      document.getElementById('learnerModal').classList.remove('hidden');
    };

    window.saveFeedback = async (id, type) => {
      const text = document.getElementById('feedbackText').value;
      await updateDoc(doc(db, 'learners', id), { [`${type}Feedback`]: text });
      const l = learners.find(x => x.id === id);
      if (l) l[`${type}Feedback`] = text;
      closeModal();
      showToast('Feedback saved and visible to learner ✅', 'success');
    };

    window.markPassed = async (id, type, name) => {
      if (!confirm('Mark ' + name + ' as passed for ' + type + '?')) return;
      await updateDoc(doc(db, 'learners', id), { [type + 'Passed']: true });
      const l = learners.find(x => x.id === id);
      if (l) l[type + 'Passed'] = true;
      showToast(name + ' marked as passed for ' + type + ' ✅', 'success');
      renderTab(currentTab);
    };

    // ── Keyboard shortcut for login ────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && document.getElementById('adminLogin').style.display !== 'none') {
        window.adminLogin();
      }
    });

    // ── Toast ─────────────────────────────────────────────────────────────
    window.showToast = (msg, type='') => {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast show ${type}`;
      setTimeout(() => t.classList.remove('show'), 4000);
    };
  </script>
  <script src="../js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>if(typeof emailjs!=='undefined')emailjs.init(EMAILJS_CONFIG.publicKey);</script>
</body>
</html>
